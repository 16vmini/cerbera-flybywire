; PlatformIO build config for the flybywire throttle controller.
; Target: Raspberry Pi Pico (RP2040). Framework: arduino-pico (Earle Philhower).
; Build: install PlatformIO (VS Code extension), open this folder, hit Upload.
; The build produces a .uf2 you can also drag-drop onto the Pico if you prefer.

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

; arduino-pico provides Serial (USB CDC) by default; no extra build flags needed.
; The USB descriptor strings are baked into the framework — see
; platform.txt in arduino-pico if customisation is wanted later.
build_flags =

; Serial monitor settings — talk to the firmware from VS Code's terminal.
monitor_speed = 115200
monitor_eol = LF
monitor_echo = yes
; LittleFS is built into the arduino-pico core — no extra lib_deps needed.
